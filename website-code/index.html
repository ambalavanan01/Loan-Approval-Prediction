<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Loan Prediction Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Admin Authentication Layer -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h1
                style="font-size: 2.25rem; margin-bottom: 2rem; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Protal Login</h1>
            <form id="authForm" style="grid-template-columns: 1fr;">
                <div class="form-group">
                    <label>User Name/Email ID:</label>
                    <input type="text" id="username" placeholder="Username or Email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn" style="width: 100%;">
                    <span>Authenticate</span>
                </button>
            </form>
            <div id="auth-error"
                style="color: var(--error); margin-top: 1.5rem; display: none; font-size: 0.95rem; font-weight: 600;">
                Authentication failed. Access denied.
            </div>
        </div>
    </div>

    <!-- User Profile & Navigation -->
    <div class="user-badge" id="userBadge" style="display: none;">
        <div class="profile-btn" onclick="toggleDropdown()">A</div>
        <div class="profile-dropdown" id="profileDropdown">
            <div class="admin-box">
                <h4>Account</h4>
                <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem;">Ambalavanan</div>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">User Name: ambalavanan@admin</div>
                <div style="color: var(--text-secondary); font-size: 0.9rem;">Email ID: ambalavanan275@gmail.com</div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <button onclick="window.location.href='history.html'"
                    style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--text-primary); padding: 1rem; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; transition: all 0.3s ease;">
                    View Detailed History
                </button>

                <button onclick="logout()"
                    style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); padding: 1rem; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; transition: all 0.3s ease;">
                    Sign Out Session
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Loan Approval Prediction Portal</h1>
            <p class="subtitle">Next-gen instant loan approval</p>
        </header>

        <div id="predict-view">
            <form id="predictionForm">
                <div class="form-group">
                    <label>CUSTOMER FULL NAME</label>
                    <input type="text" id="customerName" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label>CUSTOMER EMAIL ID</label>
                    <input type="email" id="customerEmail" placeholder="e.g. john@example.com" required>
                </div>

                <div class="form-group">
                    <label>CUSTOMER PHONE NUMBER</label>
                    <input type="tel" id="customerPhone" placeholder="e.g. +91 98765 43210" required>
                </div>

                <div class="form-group">
                    <label>GENDER</label>
                    <select id="gender" required>
                        <option value="1.0">Male</option>
                        <option value="0.0">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>MARITAL STATUS</label>
                    <select id="maritalStatus" required>
                        <option value="1.0">Married</option>
                        <option value="0.0">Single</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>EDUCATION</label>
                    <select id="education" required>
                        <option value="1.0">Graduate</option>
                        <option value="0.0">Not Graduate</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>SELF EMPLOYED</label>
                    <select id="selfEmployed" required>
                        <option value="1.0">Yes</option>
                        <option value="0.0">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>APPLICANT INCOME (₹)</label>
                    <input type="number" id="applicantIncome" value="5000" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>CO-APPLICANT INCOME (₹)</label>
                    <input type="number" id="coapplicantIncome" value="0" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>LOAN AMOUNT (₹)</label>
                    <input type="number" id="loanAmount" value="150000" placeholder="e.g. 300000" step="100" required>
                </div>

                <div class="form-group">
                    <label>LOAN TERM (YEARS)</label>
                    <input type="number" id="loanTermYears" value="20" step="0.5" required>
                </div>

                <div class="form-group">
                    <label>CREDIT HISTORY</label>
                    <select id="creditHistory" required>
                        <option value="1.0">Good (1.0)</option>
                        <option value="0.0">Poor (0.0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>EXISTING LOANS</label>
                    <input type="number" id="existingLoans" value="1" step="1" required>
                </div>

                <div class="form-group full-width">
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Run Prediction Analysis</spa <span class="spinner"></span>
                    </button>
                </div>
            </form>
            <div id="result-container"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Loan Approval Prediction. Developed by <b>Ambalavanan</b>. All rights reserved.
    </footer>

    <script src="script.js"></script>
</body>

</html>
